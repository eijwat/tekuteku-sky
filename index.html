<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekuteku Sky | Tekuteku Sky</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;500&family=Zen+Maru+Gothic:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#faf6f0;
    min-height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'Zen Maru Gothic',sans-serif;
    overflow:hidden;
  }
  h1{
    font-family:'Noto Serif JP',serif;
    font-weight:200;font-size:clamp(16px,3vw,24px);
    letter-spacing:.3em;color:#6a8faa;
    margin-bottom:12px;
    opacity:0;animation:fi 2s ease .3s forwards;
  }
  canvas{display:block;opacity:0;animation:fi 1.5s ease .1s forwards;}
  .ctrl{
    display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;
    justify-content:center;align-items:center;
    opacity:0;animation:fi 2s ease 1.5s forwards;
  }
  .ctrl label{
    font-size:11px;font-weight:400;color:#8a9aaa;
    display:flex;align-items:center;gap:6px;letter-spacing:.08em;
  }
  input[type="range"]{
    -webkit-appearance:none;appearance:none;
    width:80px;height:2px;background:#d8d0c8;outline:none;border-radius:1px;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:10px;height:10px;border-radius:50%;
    background:#6aacd0;cursor:pointer;
  }
  button{
    background:transparent;border:1.5px solid #c8d8e0;color:#6a8faa;
    padding:4px 14px;font-family:'Zen Maru Gothic',sans-serif;font-weight:400;
    font-size:11px;letter-spacing:.15em;cursor:pointer;border-radius:12px;
    transition:all .3s;
  }
  button:hover{background:#e8f0f4;border-color:#6aacd0;}
  #count{
    position:fixed;top:16px;right:20px;
    font-size:11px;font-weight:300;color:#a0b0c0;letter-spacing:.1em;
    opacity:0;animation:fi 2s ease 2s forwards;
  }
  @keyframes fi{to{opacity:1;}}
</style>
</head>
<body>
<h1>Tekuteku Sky</h1>
<canvas id="c"></canvas>
<div class="ctrl">
  <button onclick="reset()">Reset</button>
  <label>tekuteku <input type="range" min="0.1" max="2" step="0.05" value="0.7" id="spd"></label>
  <label>hole depth <input type="range" min="40" max="200" step="5" value="100" id="dep"></label>
  <label>appearance <input type="range" min="10" max="80" step="5" value="30" id="rate"></label>
</div>
<div id="count"></div>

const TEKU_SIZE = 28;
const GRAVITY = 0.35;
const BOUNCE = 0.3;
const FRICTION = 0.985;
const GROUND_FRICTION = 0.92;

let tekus = [];
let spawnTimer = 0;
let totalSpawned = 0;
let totalEscaped = 0;
let holeLeft, holeRight, holeBottom, groundY;

function sz() {
  W = Math.min(window.innerWidth - 20, 1000);
  H = Math.min(W * 0.45, 400);
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  groundY = H * 0.62;
  holeLeft = W * 0.38;
  holeRight = W * 0.62;
}

class Teku {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.angle = 0;
    this.r = TEKU_SIZE / 2;
    this.walking = true; // on ground, walking right
    this.inHole = false;
    this.settled = false; // resting in the pile
    this.floating = false; // flying away!
    this.floatTimer = 0;
    this.escaped = false; // walked off right edge
    this.settledTimer = 0;
    this.walkSpeed = 0.8 + Math.random() * 0.5;
    this.bobPhase = Math.random() * Math.PI * 2;
    this.floatPhase = Math.random() * Math.PI * 2;
    this.survivedHole = false; // has been through the hole
    this.id = totalSpawned++;
  }

  update(dt, others) {
    const spd = parseFloat(document.getElementById('spd').value);
    const dep = parseFloat(document.getElementById('dep').value);
    const realHoleBottom = groundY + dep;

    if (this.escaped) return;

    const ws = this.walkSpeed * spd;

    // === Floating away! ===
    if (this.floating) {
      this.floatTimer++;
      const ft = this.floatTimer;
      const liftAccel = 0.01 + ft * 0.0003;
      // ~30 degrees from vertical toward right: rise + drift right
      this.vy -= liftAccel * Math.cos(Math.PI / 6); // vertical component
      this.vx += liftAccel * Math.sin(Math.PI / 6); // horizontal component (rightward)
      this.vy *= 0.98;
      this.vx *= 0.98;
      // Gentle sway perpendicular to flight path
      const sway = Math.sin(ft * 0.04 + this.floatPhase) * 0.15;
      this.x += (this.vx + sway) * dt;
      this.y += this.vy * dt;
      // Slow spin
      this.angle += (0.02 + ft * 0.0002) * (this.floatPhase > Math.PI ? 1 : -1) * dt;

      // Escaped off right side
      if (this.x - this.r > W + 30) {
        this.escaped = true;
        totalEscaped++;
      }
      return;
    }

    // Walking on surface
    if (this.walking && !this.inHole) {
      this.vx = ws;
      this.vy = 0;
      this.y = groundY - this.r;
      this.x += this.vx * dt;
      this.angle += (this.vx / this.r) * 0.5 * dt;
      this.bobPhase += 0.08 * spd;

      // Reached hole edge?
      if (this.x + this.r > holeLeft && this.x - this.r < holeRight) {
        this.walking = false;
        this.inHole = true;
        this.vy = 0.5;
      }

      // Post-hole: start floating at ~75% of remaining distance
      if (this.survivedHole) {
        const floatZone = holeRight + (W - holeRight) * 0.45;
        if (this.x > floatZone) {
          this.walking = false;
          this.floating = true;
          this.vy = -0.3; // initial gentle lift
          this.floatTimer = 0;
        }
      }
    }
    // In the hole / falling / physics
    else {
      // Gravity
      this.vy += GRAVITY * dt;
      this.vx *= FRICTION;
      this.vy *= FRICTION;

      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.angle += (this.vx / this.r) * 0.5 * dt;

      // Hole walls
      if (this.x - this.r < holeLeft && this.x + this.r > holeLeft - 10 && this.y + this.r > groundY) {
        this.x = holeLeft + this.r;
        this.vx = Math.abs(this.vx) * BOUNCE;
      }
      if (this.x + this.r > holeRight && this.x - this.r < holeRight + 10 && this.y + this.r > groundY) {
        this.x = holeRight - this.r;
        this.vx = -Math.abs(this.vx) * BOUNCE;
      }

      // Hole bottom
      if (this.y + this.r > realHoleBottom) {
        this.y = realHoleBottom - this.r;
        this.vy = -Math.abs(this.vy) * BOUNCE;
        this.vx *= GROUND_FRICTION;
        if (Math.abs(this.vy) < 0.3) this.vy = 0;
      }

      // Ground level (outside hole)
      if (this.y + this.r > groundY) {
        if (this.x + this.r < holeLeft || this.x - this.r > holeRight) {
          this.y = groundY - this.r;
          this.vy = -Math.abs(this.vy) * BOUNCE;
          this.vx *= GROUND_FRICTION;
          if (Math.abs(this.vy) < 0.5) {
            this.vy = 0;
            // Landed on ground after hole - start walking again
            if (this.x - this.r > holeRight) {
              this.walking = true;
              this.inHole = false;
              this.settled = false;
              this.survivedHole = true;
              this.vx = ws;
            }
          }
        }
      }

      // Collision with other tekus
      for (const o of others) {
        if (o === this || o.escaped) continue;
        const dx = this.x - o.x;
        const dy = this.y - o.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = this.r + o.r;
        if (dist < minDist && dist > 0.1) {
          const overlap = minDist - dist;
          const nx = dx / dist;
          const ny = dy / dist;

          // Push apart
          const pushRatio = o.settled ? 0.95 : 0.5;
          this.x += nx * overlap * pushRatio;
          this.y += ny * overlap * pushRatio;
          if (!o.settled) {
            o.x -= nx * overlap * (1 - pushRatio);
            o.y -= ny * overlap * (1 - pushRatio);
          }

          // Bounce velocity
          const relVx = this.vx - (o.settled ? 0 : o.vx);
          const relVy = this.vy - (o.settled ? 0 : o.vy);
          const dot = relVx * nx + relVy * ny;
          if (dot < 0) {
            this.vx -= dot * nx * (1 + BOUNCE * 0.5);
            this.vy -= dot * ny * (1 + BOUNCE * 0.5);
            if (!o.settled) {
              o.vx += dot * nx * BOUNCE * 0.3;
              o.vy += dot * ny * BOUNCE * 0.3;
            }
          }
        }
      }

      // Check if above hole rim level -> overflow, start walking
      if (this.y + this.r < groundY && this.inHole) {
        // Overflowed! Push right
        if (this.x > (holeLeft + holeRight) / 2) {
          this.vx += 0.3 * spd;
        }
        // If clearly past hole right edge and on ground level
        if (this.x - this.r > holeRight && Math.abs(this.y - (groundY - this.r)) < 5) {
          this.walking = true;
          this.inHole = false;
          this.settled = false;
          this.survivedHole = true;
        }
      }

      // Settling detection
      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      if (speed < 0.2 && this.inHole) {
        this.settledTimer++;
        if (this.settledTimer > 30) this.settled = true;
      } else {
        this.settledTimer = 0;
      }

      // Escaped right (only non-floating)
      if (!this.floating && this.x - this.r > W + 20) {
        this.escaped = true;
        totalEscaped++;
      }
    }

    // Keep in bounds horizontally
    if (this.x - this.r < -30) this.x = -30 + this.r;
  }

  draw() {
    if (this.escaped) return;
    const px = this.x;
    let py = this.y;

    // Walking bob
    if (this.walking && !this.floating) {
      py += Math.sin(this.bobPhase) * 1.5;
    }

    cx.save();

    // Floating fade
    if (this.floating) {
      const fadeStart = 40;
      if (this.floatTimer > fadeStart) {
        const alpha = Math.max(0, 1 - (this.floatTimer - fadeStart) / 120);
        cx.globalAlpha = alpha;
      }
    }

    cx.translate(px, py);
    cx.rotate(this.angle);
    const s = TEKU_SIZE;
    cx.drawImage(tekuImg, -s/2, -s/2, s, s);
    cx.restore();
  }
}

function drawSceneBackground() {
  const dep = parseFloat(document.getElementById('dep').value);
  const realHoleBottom = groundY + dep;

  // Sky / background
  cx.fillStyle = '#faf6f0';
  cx.fillRect(0, 0, W, H);

  // Subtle horizon line
  const grad = cx.createLinearGradient(0, groundY - 30, 0, groundY);
  grad.addColorStop(0, 'rgba(200,220,230,0)');
  grad.addColorStop(1, 'rgba(200,220,230,0.15)');
  cx.fillStyle = grad;
  cx.fillRect(0, groundY - 30, W, 30);

  // Hole (dark background, drawn BEFORE tekus)
  cx.fillStyle = '#3a2a1a';
  cx.fillRect(holeLeft, groundY, holeRight - holeLeft, realHoleBottom - groundY);

  // Hole bottom line
  cx.strokeStyle = '#a89878';
  cx.lineWidth = 2;
  cx.beginPath();
  cx.moveTo(holeLeft, realHoleBottom);
  cx.lineTo(holeRight, realHoleBottom);
  cx.stroke();
}

function drawSceneForeground() {
  const dep = parseFloat(document.getElementById('dep').value);
  const realHoleBottom = groundY + dep;

  // Ground surface (drawn AFTER tekus — covers tekus walking on ground below surface)
  cx.fillStyle = '#c8b8a0';
  cx.fillRect(0, groundY, holeLeft, H - groundY);
  cx.fillRect(holeRight, groundY, W - holeRight, H - groundY);

  // Hole walls (drawn on top to create clean edges)
  cx.strokeStyle = '#a89878';
  cx.lineWidth = 2.5;
  cx.beginPath();
  cx.moveTo(holeLeft, groundY);
  cx.lineTo(holeLeft, realHoleBottom);
  cx.moveTo(holeRight, realHoleBottom);
  cx.lineTo(holeRight, groundY);
  cx.stroke();

  // Ground top line
  cx.beginPath();
  cx.moveTo(0, groundY);
  cx.lineTo(holeLeft, groundY);
  cx.moveTo(holeRight, groundY);
  cx.lineTo(W, groundY);
  cx.stroke();

  // Dirt texture in ground
  cx.fillStyle = '#b8a890';
  for (let i = 0; i < 15; i++) {
    const gx = (i * 73 + 17) % W;
    const gy = groundY + 8 + (i * 31) % 20;
    if (gx < holeLeft || gx > holeRight) {
      cx.fillRect(gx, gy, 12 + (i % 5) * 3, 2);
    }
  }
}

function reset() {
  tekus = [];
  spawnTimer = 0;
  totalSpawned = 0;
  totalEscaped = 0;
}

function loop() {
  const spd = parseFloat(document.getElementById('spd').value);
  const rate = parseFloat(document.getElementById('rate').value);

  // Spawn new tekuteku
  spawnTimer++;
  if (spawnTimer >= rate / spd) {
    spawnTimer = 0;
    tekus.push(new Teku(-TEKU_SIZE, groundY - TEKU_SIZE / 2));
  }

  // Update
  for (const t of tekus) t.update(1, tekus);

  // Remove escaped
  tekus = tekus.filter(t => !t.escaped || t.x < W + 100);

  // === Draw order: background → ALL tekus → foreground ===

  // 1. Background (sky + hole dark area)
  drawSceneBackground();

  // 2. ALL tekus — no clipping, no separation
  //    Sort by y so deeper ones draw first
  const sorted = [...tekus].sort((a, b) => a.y - b.y);
  for (const t of sorted) t.draw();

  // 3. Foreground (ground covers lower half of walking tekus naturally)
  drawSceneForeground();

  // Pile count in hole
  const inHole = tekus.filter(t => t.inHole && !t.walking && !t.floating).length;
  const walking = tekus.filter(t => t.walking && !t.floating).length;
  const flying = tekus.filter(t => t.floating).length;
  countEl.innerHTML = `穴の中: ${inHole}　歩行中: ${walking}　飛行中: ${flying}　旅立ち: ${totalEscaped}`;

  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { sz(); });
</script>
</body>
</html>
